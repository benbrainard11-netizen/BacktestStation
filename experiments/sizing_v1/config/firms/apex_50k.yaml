  session; locks at start+$100 ($50,100) once EOD HW reaches $52,100. PA DLL
  scales $1,000 -> $3,000 with profit level (eval DLL pauses the day only).
  THE DEFINING ECONOMICS: 100% payout split BUT hard ladder — max 6 payouts
  per PA, caps $1,500/$1,500/$2,000/$2,500/$2,500/$3,000 = $13,000 LIFETIME
  per PA, then the PA CLOSES and the funnel restarts (new eval + $99
  activation). Each payout needs 5 qualifying days >= $250 since the last;
  min balance to request $52,600; 50% soft consistency at request time.
  4.0 evals: one-time fee, 30-day access window, NO RESETS (re-buy on fail).

