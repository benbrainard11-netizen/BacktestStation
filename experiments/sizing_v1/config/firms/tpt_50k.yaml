# TakeProfitTrader $50K — Test -> PRO (sim-funded).
# AUDITED 2026-06-12 from official Zendesk help articles (confidence: mixed —
# pricing from secondaries).
# *** DEPLOYMENT BLOCKER: TPT bans ALL bots/algos — every trade must be
# *** manually executed. INCOMPATIBLE with the automated copier fleet.
# *** Config kept for completeness/manual-trading scenarios only.

firm_name: tpt
account_size: 50000
evaluation_type: funded
notes: |
  PRO sim-funded (audited): the HARSHEST funded drawdown of the six —
  INTRADAY trailing on real-time peak INCLUDING unrealized gains ($2,000
  distance), locks once it reaches starting balance. No DLL. Payouts: 80/20
  split (worst of the six), but instant (Plaid/Wise/PayPal), no minimums/caps
  once balance > $52,000 buffer; buffer paid only at termination (50%/80% by
  age). PRO news-flat windows (FOMC/NFP/CPI; CL inventories; ZN/ZB auctions).
  Must trade >= 1 day/week. PRO resets $649 (max 3).

trailing_drawdown: 2000
trailing_dd_uses_eod: false            # PRO = intraday peak incl. UNREALIZED (harshest)
trailing_dd_lock_threshold: 52000
trailing_dd_locked_value: 50000

daily_loss_limit: 0
daily_loss_intraday: true

payout_min_winning_days: 0
payout_winning_day_threshold_usd: 0
payout_profit_threshold: 2000          # balance must exceed $52,000 buffer
payout_amount_method: half_of_profits  # proxy; actual = 80% of profits above buffer
payout_cap_usd: 999999                 # no cap
payout_balance_after: keep_remainder
payout_resets_winning_day_counter: true

consistency_rule_pct: 100              # none in PRO
consistency_rule_applies_at: funded

max_position_size: 6                   # 6 minis / 60 micros, Test and PRO
max_total_position: 6
allowed_symbols: [ES.c.0, NQ.c.0, YM.c.0, RTY.c.0]

news_blackout_minutes_before: 1        # PRO: flat 1 min before/during/after listed events
news_blackout_minutes_after: 1
events_blocked: [FOMC, NFP, CPI]

sim_max_days: 365
monthly_subscription_usd: 170          # Test is a monthly subscription (list)
eval_fee_usd: 130                      # PRO activation (promos often waive)
funded_account_value_usd: null

audit:
  date: 2026-06-12
  confidence: mixed
  eval:
    fee: "$170/mo subscription list (NOFEE40/50 promos common); test reset $99"
    target: 3000
    trailing_dd: 2000
    dd_type: EOD-trailing in Test (locks at starting balance); PRO switches to intraday-incl-unrealized
    daily_loss_limit: none
    consistency: 50% best-day (non-failing; goal doubles until met)
    min_days: 5
    max_contracts: 6 minis / 60 micros
  overnight: "auto-flat 4:55 PM ET; day-trade only all stages"
  copy_policy: "own accounts, approved copier list only; max 5 PROs; no counter-positions across accounts"
  payout_split: "80/20 (PRO); PRO+ invite = 90/10"
  automation: "*** BANNED — all trades manually executed; no bots/algos of any kind ***"
  sources:
    - https://takeprofittraderhelp.zendesk.com/hc/en-us/articles/15170265979165
    - https://takeprofittraderhelp.zendesk.com/hc/en-us/articles/15171769361053-PRO-Account-Rules
    - https://takeprofittraderhelp.zendesk.com/hc/en-us/articles/15172219527581
    - https://takeprofittraderhelp.zendesk.com/hc/en-us/articles/34431153546397
