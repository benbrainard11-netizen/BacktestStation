# Tradeify — $50K account.
# Numbers TBD by user/friend research.

firm_name: tradeify
account_size: 50000
evaluation_type: combine
notes: |
  Tradeify is newer; rules to confirm with their docs.

# Daily Loss Limit.
daily_loss_limit: 1500        # TBD
daily_loss_intraday: true

# Trailing Drawdown.
trailing_drawdown: 2500       # TBD
trailing_drawdown_locks_at_starting_balance: true
trailing_drawdown_resets_daily: false
trailing_drawdown_uses_eod: true

# Profit Target.
profit_target: 3000           # TBD

# Consistency Rule.
consistency_rule_pct: 30      # TBD
consistency_rule_applies_at_eval: false
consistency_rule_applies_at_funded: true

# Min activity.
min_trade_days: 5             # TBD
min_trade_count_per_day: 0

# News / event restrictions.
news_blackout_minutes_before: 0     # TBD
news_blackout_minutes_after: 0
events_blocked: []

# Eval window.
max_eval_days: 30             # TBD

# Contract limits.
max_position_size: 5          # TBD
max_total_position: 5
allowed_symbols:
  - ES.c.0
  - NQ.c.0
  - YM.c.0
  - RTY.c.0

# Reset.
allow_reset: true
reset_cost_usd: 80            # TBD

# Economics.
eval_fee_usd: 165             # TBD
funded_account_value_usd: 1000
