# Tradeify $50K — Growth Evaluation -> Growth Sim Funded (standard path).
# AUDITED 2026-06-12 from official help-center pages (confidence: official-page).

firm_name: tradeify
account_size: 50000
evaluation_type: funded
notes: |
  Growth sim-funded (audited): EOD-trailing $2,000 (real-time enforced), locks
  at start+$100 once EOD HW hits $52,100. DLL $1,250 SOFT both stages (rises
  to $2,000 after +6% profit). Payout gates per request: balance >= $53,000,
  5 winning days > $150 (counter resets every payout), 35% consistency, caps
  $1,500/$2,000/$2,500/$3,000+ by payout number, min $500, 90/10.
  CRITICAL COMPLIANCE GATE: >50% of trades AND >50% of profit must come from
  holds > 10 SECONDS, checked at activation AND every payout (hard mechanical
  gate). Sim Funded accounts cannot be reset. Weekly activity required.

trailing_drawdown: 2000
trailing_dd_uses_eod: true
trailing_dd_lock_threshold: 52100
trailing_dd_locked_value: 50100

daily_loss_limit: 1250                 # SOFT breach both stages (day-stop, not blow)
daily_loss_intraday: true

payout_min_winning_days: 5
payout_winning_day_threshold_usd: 150
payout_profit_threshold: 3000          # balance >= $53,000 gate
payout_amount_method: half_of_profits  # proxy; ladder caps dominate
payout_cap_usd: 1500                   # first payout; ladder to $3,000+ by request #
payout_balance_after: keep_remainder
payout_resets_winning_day_counter: true

consistency_rule_pct: 35               # payout gate only, never fails the account
consistency_rule_applies_at: funded

max_position_size: 4                   # 4 minis / 40 micros (post-2025-09-12 accounts)
max_total_position: 4
allowed_symbols: [ES.c.0, NQ.c.0, YM.c.0, RTY.c.0]

news_blackout_minutes_before: 0        # news trading allowed
news_blackout_minutes_after: 0
events_blocked: []

sim_max_days: 365
monthly_subscription_usd: 0
eval_fee_usd: 145                      # one-time list (promos common); reset $95
funded_account_value_usd: null

audit:
  date: 2026-06-12
  confidence: official-page
  eval:
    fee: "$145 one-time list (Growth); reset $95; eval purchases capped 15/30d"
    target: 3000
    trailing_dd: 2000
    dd_type: EOD-trailing, real-time enforced, never locks in eval
    daily_loss_limit: 1250 soft
    consistency: none in eval (1-day pass possible)
    min_days: 1
    max_contracts: 4 minis / 40 micros
  overnight: "flat by 4:59 PM ET all stages incl. Live"
  copy_policy: "own accounts only; max 5 sim-funded total; 5 activations/day; bots allowed w/ sole-ownership proof"
  payout_split: "90/10"
  automation: "personal non-HFT bots allowed (video verification possible)"
  compliance_flags: "10-second/50% hold-time gate at activation AND every payout — hard mechanical check"
  sources:
    - https://help.tradeify.co/en/articles/14369021-tradeify-pricing-reference
    - https://help.tradeify.co/en/articles/11083796-growth-funded-account-payout-policy
    - https://help.tradeify.co/en/articles/10495897-rules-trailing-max-drawdowns
    - https://help.tradeify.co/en/articles/10468318-guidelines-for-traders
