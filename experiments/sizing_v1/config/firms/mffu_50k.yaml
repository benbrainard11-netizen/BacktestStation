payout_amount_method: half_of_profits  # proxy; actual = anything above buffer
payout_cap_usd: 999999                 # no documented cap on Rapid
payout_balance_after: keep_remainder
payout_resets_winning_day_counter: true

consistency_rule_pct: 100              # NONE in funded stage (eval-only 50% soft)
consistency_rule_applies_at: funded

max_position_size: 5                   # 5 minis / 50 micros both stages
max_total_position: 5
allowed_symbols: [ES.c.0, NQ.c.0, YM.c.0, RTY.c.0]

news_blackout_minutes_before: 2        # T1 releases, funded stage only
