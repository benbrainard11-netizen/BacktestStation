# AUDITED 2026-06-12 from official help-center pages (confidence: official-page).

firm_name: mffu
account_size: 50000
evaluation_type: funded
notes: |
  Rapid sim-funded (audited): INTRADAY-trailing $2,000 from equity high-water
  (stricter than the EOD-trailing eval!), locks at start+$100. No DLL. Payouts
  are the firm's selling point: DAILY cadence, eligible 24h after first funded
  trade, min $500, buffer $2,100 above start must remain, NO winning-day
  minimums, NO funded consistency, NO documented payout cap, 90/10 split
  (raised Jan 2026). Eval: EOD-trailing, 50% soft consistency, 2 min days.
  Funded news rule: must be flat 2 min around T1 releases (only firm of the
  six with a funded news blackout).

