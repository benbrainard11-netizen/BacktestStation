    Roll integrity NOT verified at this lock. Continuous-symbol back-adjustment
    risk is open. If lock_holdout_1 result diverges significantly from
    exploratory window per-trade R, roll-mechanic distortion is a candidate
    cause. Separate Lane 1 work to verify.

code:
  repo_commit_sha: "e2368d0c7f74e7655adf6dcb553bba3e223f299f"
  repo_url: "https://github.com/benbrainard11-netizen/BacktestStation"
  repo_branch: "assets/expanded-universe-v1"
  simulator: "backend/scripts/ml/rigorous_backtest_v7_stops.py simulate_v7"
