    fvg_strict: "D:/BacktestStationData/strategy_lab_core_2026_05_15_strict_reactions/data/ml/anchors/fvg_snapshots_xctx_fvggeom_obgeom_strict.parquet"
    swing: "D:/BacktestStationData/strategy_lab_core_2026_05_15_strict_swing_pivot/data/ml/anchors/swing_snapshots_strict.parquet"
