# =============================================================================
# TRADE RULE (v8a)
# =============================================================================

trade_rule:
  name: "v8a"
  stop:
    primary_timeframe_min: 5
    primary_atr_periods: 14
    primary_atr_mult: 2.0
    floor_timeframe_min: 30
    floor_atr_periods: 14
    floor_atr_mult: 1.5
    formula: "max(2.0 * ATR(14, 5m), 1.5 * ATR(14, 30m))"
  target:
    atr_mult: 5.0
    formula: "5.0 * ATR(14, 5m)"
    note: "R:R = 5:2 = 2.5:1 (target_dist / stop_dist = 5*ATR / (2*ATR or 1.5*ATR_30m) ≈ 2.5)"
  trade_window_min: 240
  confirmation_window_min: 60
  confirmation_rule: "first bar with close in trade direction"
  entry_rule: "open of bar AFTER confirmation bar"
  ambiguity_rule: "stop wins (CLAUDE.md rule #8)"
  entry_bar_exit_check: false  # entry bar skipped for exit detection (TBBO 89% retention reason)
  dedup_rule: "deduplicate by (anchor.primary_symbol, anchor.bar_end_utc, anchor.side)"

# =============================================================================
# FILL MODELS
# =============================================================================

fill_models:
  primary:
    name: "2tick_adverse"
    entry_ticks: 2.0
    stop_ticks: 2.0
    target_ticks: 0.0
    time_exit_ticks: 2.0
    target_fill_rule: "limit fills at exact target_price if any print at-or-past target occurred"

  stress_tests:
    - name: "1tick_adverse"
      entry_ticks: 1.0
      stop_ticks: 1.0
      target_ticks: 0.0
      time_exit_ticks: 1.0
    - name: "no_slippage"
      entry_ticks: 0.0
      stop_ticks: 0.0
      target_ticks: 0.0
      time_exit_ticks: 0.0

# =============================================================================
# PORTFOLIO
# =============================================================================

portfolio:
  # For this locked walk-forward, run families INDEPENDENTLY (not concurrency-capped).
  # Full single-account portfolio sim with priority queue is item 6 of the validation
  # list, deferred to after the locked walk-forward to keep this run interpretable.
  mode: "independent_family"
  max_contracts_per_family: 1
  cap_concurrent_across_families: null   # not enforced in this run
  symbols: ["NQ.c.0", "ES.c.0"]
  rationale: |
    Per-family independent simulation gives us the cleanest signal on whether
    each family's edge generalizes to untouched data. Portfolio concurrency
    haircut is applied as a known factor in post-analysis. Mixing per-family
    survival with concurrency effects in one run would confound the signal.

# =============================================================================
# REPORTING (the ONLY allowed metrics for the locked windows)
# =============================================================================

allowed_metrics:
  per_family:
    - n_trades
    - cum_r
    - avg_r
    - win_rate
    - max_dd_r
    - years_positive
    - per_year_cum_r
    - per_symbol_split  # NQ vs ES
    - per_session_split  # asia_overnight / eu_pre_ny / us_rth

  per_window_summary:
    - total_cum_r_across_families
    - n_trades_total
    - worst_day_r
    - worst_week_r
    - top_20_days_contribution_pct
    - daily_r_bootstrap_ci_95

  comparison_to_exploratory:
    - avg_r_ratio_per_family  # locked_holdout / exploratory_window
    - per_year_consistency_check
    - direction_consistency  # does the winning direction match?

forbidden_during_locked_run:
  - "any new hour-filter exploration"
  - "any new symbol-filter exploration"
  - "any new slippage-mult exploration"
  - "any new family-selection exploration"
  - "any new direction-flip exploration"
  - "any individual losing-trade inspection BEFORE pass/fail recorded"
  - "any change to candidate config based on locked-window results"

# =============================================================================
# PASS/FAIL THRESHOLDS (pre-registered)
# =============================================================================

pass_thresholds_locked_holdout_1:
  description: "2018-2019 — primary test"

  per_family_must_pass:
    - condition: "cum_r > 0"
      rationale: "Each family individually positive on untouched data"
    - condition: "yrs_positive >= 1 of 2"   # loose for 2-year window
      rationale: "At least one of 2018/2019 positive per family"
    - condition: "avg_r_ratio >= 0.4"
      rationale: "Per-trade R within ~40% of 2020-2025 (allows regime variance)"

  combined_must_pass:
    - condition: "total cum_r > 0 across all 4 families"
    - condition: "no single family contributes > 75% of total cum_r"
    - condition: "both NQ and ES contribute positive cum_r in aggregate"
    - condition: "top 20 days contribute < 60% of total cum_r"
    - condition: "result survives 2-tick slippage stress (primary fill model)"

  overall: |
    PASS if ALL per-family conditions pass for at least 3 of 4 families
    AND ALL combined conditions pass.

    FAIL if any combined condition fails OR more than 1 family fails per-family.

    PARTIAL if 2 of 4 families fail per-family. Investigation required;
    not a clean pass.

pass_thresholds_locked_holdout_2:
  description: "2026 YTD — secondary, weak signal"

  combined_must_pass:
    - condition: "total cum_r > 0 across all 4 families"
    - condition: "pro-rated annual rate within ±70% of expected"
      rationale: "Small sample, loose threshold"

  overall: |
    PASS if combined conditions met.
    FAIL is informative but not fatal (small sample).
    Result is supplementary evidence, not the gate.

deploy_decision:
  if_both_holdouts_pass: "candidate is a Type B deploy candidate (still needs portfolio sim + live paper test)"
  if_holdout_1_pass_holdout_2_fail: "weak. Re-examine 2026 YTD specifically. Possible regime issue."
  if_holdout_1_fail_holdout_2_pass: "concerning. Possible overfitting to 2020-2025 regime."
  if_both_fail: "candidate fails locked walk-forward. Edge is research-only or non-existent."
  if_partial_holdout_1: "investigate which families fail. Possible per-family validity claim."

# =============================================================================
# BUG-FIX POLICY (the only allowed modifications after this lock)
# =============================================================================

bug_policy:
  allowed_only_if: "implementation contradicts this lockfile or its referenced spec"
  forbidden_changes:
    - "outcome-driven threshold adjustments"
    - "post-hoc filter additions"
    - "post-hoc family selection changes"
    - "slippage assumption tightening to make result look better"
    - "symbol removal to remove bad performers"

  required_for_any_bug_fix:
    - "Write bug_exception_<date>.md documenting: what bug, how discovered, why it violates spec, code diff, expected impact direction before rerun, whether locked-window results were already viewed"
    - "Archive prior locked-window results"
    - "Rerun ALL windows after fix"
    - "Append entry to trial_lock_records.bug_exceptions_after_lock_json"

