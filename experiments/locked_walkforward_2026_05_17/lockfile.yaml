  research_events_path: "data/research_events"
  bar_data_path: "D:/data/processed/bars/timeframe=1m"
  bar_data_coverage: "2015-01-01 to 2026-05-15"
  symbols: ["NQ.c.0", "ES.c.0"]

  anchor_matrices:
