# Locked Walk-Forward Protocol — v13-v19 Type B deploy candidate
# Test on untouched out-of-sample windows: 2018-2019 + 2026 YTD
#
# Per GPT-5 Pro Research protocol. This file is BINDING from the moment it's
# committed. Bug-fix policy at bottom is the only mechanism for changes after.

protocol_id: locked_walkforward_v13_v19_2026_05_17
created_at_utc: "2026-05-17T22:30:00Z"
created_by: benpc
purpose: |
  Test the existing v13-v19 deploy candidate (frozen exactly as-is) against
  data windows it has never seen during research. The candidate was developed
  through exploration on 2020-2025; this protocol locks the candidate and
  evaluates it on 2018-2019 + 2026 YTD as genuine out-of-sample data.

  This is NOT a fresh train/validate/test split. The candidate is pre-existing.
  These are HOLDOUT TESTS, not validation.

# =============================================================================
# WINDOWS
# =============================================================================

windows:
  # Exploratory / contaminated — already used for v13-v19 research
  exploratory:
    start: "2020-01-01"
    end: "2026-01-01"
    description: "Contaminated by 6 months of audit/research; results NOT counted toward validation"

  # Locked holdout 1 — primary test window (large, statistically meaningful)
  locked_holdout_1:
    start: "2018-01-01"
    end: "2020-01-01"
    description: "Pre-2020 untouched. 2 years, ~865K events across 4 families. Primary test."

  # Locked holdout 2 — secondary test window (small, weak signal)
  locked_holdout_2:
    start: "2026-01-01"
    end: "2026-05-15"  # bars available through this date
    description: "2026 YTD, ~95 trading days, untouched. Weak signal but additional evidence."

# Boundary purge: exclude any event whose trade window (60m confirmation +
# 240m trade window + buffer) would cross into the exploratory window.
purge_boundary_minutes: 305
purge_rule: |
  For locked_holdout_1 events: exclude any fire_ts > 2019-12-31 19:55 UTC
    (305 min before 2020-01-01 00:00 UTC).
  For locked_holdout_2 events: end window is fixed; no forward leak possible.

# =============================================================================
# DATA / CODE STATE
# =============================================================================

