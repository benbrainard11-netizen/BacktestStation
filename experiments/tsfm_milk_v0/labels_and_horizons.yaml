# tsfm_milk_v0 label configuration.
# 3-way classification (up / down / flat) at 5 horizons.

version: 0

horizons_minutes:
  - 15
  - 30
  - 60
  - 90
  - 240

# Threshold rule — Option A (locked 2026-05-27 after empirical comparison in
# explore_label_thresholds.py; see report/STATUS_FOR_BEN.md addendum):
#
#   up    if future_return >  +k * sigma_h(t)
#   down  if future_return <  -k * sigma_h(t)
#   flat  otherwise
#
# where:
#   future_return(t, h) = log(close_{t+h} / close_t)
#   sigma_h(t)          = rolling stddev of h-minute log returns, computed
#                          per (symbol, horizon) over the last ~30 trading days
#   k                   = 0.5  (locked)
#
# Empirical class balance pooled across 12 (symbol × month) cells:
#   horizon 15m  → flat 35%  up 33%  down 32%
#   horizon 30m  → flat 35%  up 34%  down 32%
#   horizon 60m  → flat 36%  up 33%  down 31%
#   horizon 90m  → flat 37%  up 33%  down 30%
#   horizon 240m → flat 42%  up 31%  down 27%
#
# All three classes stay in the 25-45% band → trainable 3-way classification.
thresholding:
  rule: horizon_specific_sigma   # Option A
  k: 0.5
  sigma_h_window_bars: 41400     # ~30 trading days at ~1380 1-min bars/day
  sigma_h_min_observations: 1000 # require at least this many forward returns to compute
  fallback_when_insufficient: drop_anchor  # don't fabricate sigma_h

class_codes:
  flat: 0
  up:   1
  down: 2

# Rows to reject before training.
reject_rules:
  - reason: missing_sigma
    description: sigma is null or zero
  - reason: future_bar_outside_rth
    description: required forward bar falls outside RTH (cuts 4h horizon late in session)
  - reason: insufficient_lookback
    description: lookback window has < min_bars_in_lookback bars
  - reason: roll_boundary_in_label_window
    description: continuous-contract instrument_id changes inside [ts, ts+h]

# Empirical class distributions confirmed 2026-05-27 (explore_label_thresholds.py
# Option A on 3 sample months × 4 symbols = 12 cells per horizon).
expected_balance:
  h_15m:  {flat: 0.35, up: 0.33, down: 0.32}
  h_30m:  {flat: 0.35, up: 0.34, down: 0.32}
  h_60m:  {flat: 0.36, up: 0.33, down: 0.31}
  h_90m:  {flat: 0.37, up: 0.33, down: 0.30}
  h_240m: {flat: 0.42, up: 0.31, down: 0.27}
