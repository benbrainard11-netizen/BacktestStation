# Detector → family_type mapping for risk_conditioner_v0.
#
# Type A (predictive): event population is direction-neutral, model picks alpha subset.
#                      Full risk prediction allowed (p_bad, pred_MAE_q80, ttt, p_target_before_stop).
# Type B (confirmatory): event class IS the alpha; direction in the event.
#                        TAIL-RISK REDUCTION ONLY (y_tail, p_tail). NO generic good/bad.
# UNKNOWN: excluded from training until explicitly classified via the audit framework.
#
# Audit framework: backend/scripts/ml/v13_registry_audit.py (A/B/C/D 4-variant backtest).
# Type A/B framework discovered 2026-05-16. See docs/OVERNIGHT_2026_05_16_V2_TYPE_B_DISCOVERY.md.

detector_families:

  # === Type A (predictive — full risk model allowed) ===
  ogap_rejection:
    family_type: A
    notes: "v8a model gets +79R/6yr. Confirmed Type A 2026-05-16."
    confirmed_date: 2026-05-16

  # === Type B (confirmatory — tail-risk reduction only) ===
  ob_break_continuation:
    family_type: B
    notes: "Confirmed Type B 2026-05-16. Part of combined +13,120R portfolio."
    confirmed_date: 2026-05-16

  fvg_zone_reaction:
    family_type: B
    notes: |
      Headline edge. +10,420R / 6 yrs / 0.150 avg R / 69K trades.
      6 of 6 years positive after 2-tick slippage + cap=10.
      CRITICAL: report this family separately in every evaluation.
      If the conditioner erodes this edge, kill or restrict to shadow.
    confirmed_date: 2026-05-17

  swing_pivot_break_reversed:
    family_type: B
    notes: |
      Confirmed Type B 2026-05-16. Direction is FLIPPED from the label name
      (label name says continuation, true edge is reversal).
    confirmed_date: 2026-05-16

  # === UNKNOWN (excluded from v0 training until audited) ===
  # All other detectors found in backend/app/research/detectors/ — including
  # equal_levels, swing_pivot, forming_volume_profile, smt_*, psp_*,
  # liquidity_sweep, opening_range_breakout, opening_gap_levels,
  # first_third_range, displacement_candle, interval_true_range,
  # time_profile, volume_profile, macro_event_anchor — default to UNKNOWN
  # and are excluded from training.
  #
  # To add: run the A/B/C/D audit (backend/scripts/ml/v13_registry_audit.py-style),
  # confirm family, then add an entry here with confirmed_date.

# Default for unmapped detector names
default_family_type: UNKNOWN

# Behavior for UNKNOWN at inference time
unknown_behavior:
  size_mult: 1.0
  status: "unknown_family_fallback"
  log: true
