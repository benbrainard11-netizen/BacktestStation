# Locked v0 feature schema for risk_conditioner_v0.
# 45 features total = 40 MBP-1/OHLCV/context + 5 MBO tail-risk.
# All features computed using only information available at or before ts_decision_i.
#
# Expansion is a v0.3 task. Do NOT add features here until v0 baselines saturate.

version: 0
total_feature_count: 45

groups:

  # ----- A. Detector context (8) -----
  detector_context:
    count: 8
    features:
      - detector__name_id                       # categorical id
      - detector__family_type_id                # 0=A, 1=B, 2=UNKNOWN
      - detector__raw_score                     # detector's own confidence
      - detector__confidence                    # normalized 0-1
      - detector__age_bars                      # bars since signal first qualified
      - detector__setup_quality                 # detector-specific quality metric
      - detector__distance_to_entry_ticks       # signed
      - detector__reward_risk_ratio             # target_ticks / risk_ticks

  # ----- B. Top-of-book MBP-1 (8) -----
  top_of_book_mbp1:
    count: 8
    features:
      - mbp1__spread_last_ticks
      - mbp1__top_imbalance_last
      - mbp1__side_imbalance_mean_60s           # side * top_imbalance
      - mbp1__microprice_dev_ticks              # (microprice - mid) / tick_size
      - mbp1__bid_size_min_60s
      - mbp1__ask_size_min_60s
      - mbp1__side_fade_count_60s
      - mbp1__opposite_fade_count_60s

  # ----- C. Trade flow MBP-1 (6) -----
  trade_flow_mbp1:
    count: 6
    features:
      - mbp1__trade_imbalance_60s
      - mbp1__side_trade_imbalance_60s
      - mbp1__message_rate_60s
      - mbp1__trade_rate_60s
      - mbp1__quote_to_trade_ratio_60s
      - mbp1__signed_volume_300s

  # ----- D. Realized vol (4) -----
  realized_vol:
    count: 4
    features:
      - vol__realized_vol_ticks_60s
      - vol__realized_vol_ticks_300s
      - vol__range_ticks_900s
      - vol__atr_5m_20bars

  # ----- E. Higher timeframe context (6) -----
  higher_timeframe:
    count: 6
    features:
      - htf__close_to_session_vwap_ticks_1m     # VWAP-so-far, not final
      - htf__ema_fast_minus_slow_ticks_5m
      - htf__rsi_14_5m
      - htf__distance_to_prior_day_high_ticks
      - htf__distance_to_session_high_ticks     # session-high-so-far, not final
      - htf__opening_range_position_pct         # null if OR not yet closed

  # ----- F. Cross-asset (3) -----
  cross_asset:
    count: 3
    features:
      - xasset__NQ_minus_ES_ret_z_300s
      - xasset__ZN_ret_z_300s
      - xasset__risk_off_score_300s             # z(ZN_ret) - z(equity_basket_ret)

  # ----- G. Session / time (3) -----
  session_time:
    count: 3
    features:
      - time__sin_time_of_day
      - time__minutes_since_rth_open
      - time__rth_edge_bucket                   # 0=normal, 1=first_15m, 2=last_30m

  # ----- H. Lagged detector performance (2) -----
  # STRICT RULE: only trades with label_end < ts_signal_i may be used.
  # No same-day future leakage. No completed-later-but-started-earlier leakage.
  lagged_detector_perf:
    count: 2
    features:
      - hist__detector_win_rate_50
      - hist__detector_mean_mae_r_50

  # ----- I. MBO tail-risk (5) — NEW in v0 -----
  # Computed only where MBO data is available (~2026-01-01 onward, growing).
  # Missing for trades outside that window → null + mbo_available=False.
  # LightGBM handles null natively.
  #
  # Reusable code: experiments/mbo_features_v0/scan.py already computes
  # cancel_to_trade, add_to_cancel, aggressive_buy_ratio, iceberg_proxy
  # per 1m bin from raw DBN. Adapt for rolling 60s/300s windows on the
  # trade-decision side.
  mbo_tail_risk:
    count: 5
    features:
      - mbo__side_cancel_rate_60s               # adverse-flow predictor
      - mbo__add_to_cancel_ratio_60s            # passive aggression intent
      - mbo__opposite_iceberg_refills_300s      # hidden size against you
      - mbo__seconds_since_side_sweep           # recent sweep on entry side
      - mbo__l2_to_l5_imbalance_shift_60s       # deeper-book intent

# Metadata column (not a model feature)
metadata_columns:
  - mbo_available                               # bool: True if MBO features are real

# v0.3 expansion candidates — NOT in v0.
# Add only after v0 baselines saturate.
expansion_candidates:
  more_mbp1_windows:
    - "MBP-1 features at 15s, 300s, 900s, 3600s"
  more_cross_asset:
    - CL, GC, ZB, ZF, ZT, NG, HG
  zone_geometry:
    - zone width, zone age, distance to zone mid/edge, prior reaction count
  more_detector_history:
    - win rates and MAE at 20-, 100-, 250-trade lookback windows
  tsfm_embeddings:
    - "TTM / Moirai / Chronos embeddings as auxiliary features"
  path_b_legacy:
    - "6-year pre-MBP-1 trades with OHLCV-only features"
